# Supabase local dev config — https://supabase.com/docs/guides/cli/config
# NOTE: ports bumped +1000 in this worktree so its local Supabase stack can
# run alongside the main village-app directory's stack without colliding.
[api]
port = 55321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 55322
shadow_port = 55320
major_version = 15

[studio]
port = 55323

[inbucket]
port = 55324
smtp_port = 55325
pop3_port = 55326

[analytics]
port = 55327

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:8081"
additional_redirect_urls = ["https://localhost:8081"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = true
enable_confirmations = false
template = "Your The Village code is {{ .Code }}"
