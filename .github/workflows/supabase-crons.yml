name: Supabase scheduled crons

# Replaces the pg_cron HTTP-callout schedules from migrations 014/023/025/039
# (and now 063 for V4 Gear moderation SLA — see SOP §10) — left in place as
# no-ops on hosted Free Tier — they fail silently because
# `app.supabase_url` and `app.service_role_key` GUCs require superuser-only
# `ALTER DATABASE` which Supabase Free Tier locks. This workflow is the
# operational executor of those schedules until we either upgrade to Pro+
# (where Supabase support unlocks the GUCs) or refactor to Supabase Vault.
#
# Pure SQL pg_cron jobs — `daily-checkin-reminder` (mig 025) and
# `presence-cleanup` (mig 014, currently commented out) — continue to run
# in pg_cron because they don't make HTTP calls and don't need the GUCs.
#
# `room-weekly-summaries-sunday` (mig 028) is intentionally NOT listed here:
# the Connect tab is hidden by product decision (see project memory
# `feedback_connect_tab_hidden.md`); re-add when V3 ships.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_PROJECT_REF        — e.g. albyndcruwopulazvpjs
#   SUPABASE_SERVICE_ROLE_KEY   — service-role JWT from Supabase dashboard

on:
  schedule:
    # Times in UTC. Match the original pg_cron schedules exactly.
    - cron: '*/30 * * * *'   # appointment-reminders   (was */15; bumped to */30 to stay within GH Actions free-tier minute cap; reminder windows are ±30min so SMS still arrives <30min before the appointment)
    - cron: '0 7 * * *'      # review-summary-refresh   (3am ET)
    - cron: '10 5 * * *'     # ai-milestone-explainer-nightly (00:10 ET) — drips 5 stale rows/night to fit under 60s edge-fn wall
    - cron: '10 9 * * *'     # home-feed-curator-daily  (05:10 ET)
    - cron: '0 6 * * *'      # gear-cpsc-recall-sync    (02:00 ET)
    - cron: '0 4 * * *'      # ai-weekly-journey-fill-nightly (00:00 ET)
    - cron: '0 9 * * *'      # events-ingest-ics-daily  (05:00 ET) — pull partner ICS feeds
    - cron: '30 9 * * *'     # ai-event-screen-sweep    (05:30 ET) — Haiku-screen newly-ingested events
    - cron: '45 9 * * *'     # events-geocode-sweep     (05:45 ET) — geocode any text-only LOCATION rows
    - cron: '*/5 * * * *'    # gear-moderation-pager    — every 5 min; pushes P0 reports past 4hr SLA to founders (migration 063, SOP §10 item 1)
    - cron: '*/15 * * * *'   # gear-moderation-auto-withdraw — every 15 min; auto-withdraws listings tied to P0 reports past 4hr SLA via SQL RPC (migration 063, SOP §10 item 2). Body field tells the edge fn to invoke the RPC.
    - cron: '0 13 * * *'     # gear-moderation-daily-digest — 13:00 UTC (09:00 ET) — emails the moderator inbox a daily roll-up of open + auto-actioned reports via Resend (SOP §10 item 3)
    - cron: '0 13 * * 0'     # villie-weekly-digest — Sunday 13:00 UTC (09:00 ET) — user-facing weekly newsletter to notif_prefs.newsletter=true opt-ins (migration 067)
  workflow_dispatch:
    inputs:
      function:
        description: 'Function name to invoke on-demand'
        required: true
        type: choice
        options:
          - appointment-reminder
          - refresh-stale-summaries
          - ai-milestone-explainer
          - home-feed-curator
          - gear-cpsc-recall-sync
          - ai-weekly-journey-fill
          - events-ingest-ics
          - ai-event-screen
          - events-geocode
          - gear-moderation-pager
          - gear-moderation-auto-withdraw
          - gear-moderation-daily-digest
          - villie-weekly-digest
      body:
        description: 'JSON body to send (defaults to {} or per-function default)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  invoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Route schedule to function
        id: route
        env:
          SCHEDULE: ${{ github.event.schedule }}
          DISPATCH_FN: ${{ github.event.inputs.function }}
          DISPATCH_BODY: ${{ github.event.inputs.body }}
        run: |
          set -euo pipefail
          # workflow_dispatch path
          if [ -n "${DISPATCH_FN}" ]; then
            FN="${DISPATCH_FN}"
            BODY="${DISPATCH_BODY:-}"
          else
            case "${SCHEDULE}" in
              '*/30 * * * *') FN='appointment-reminder';     BODY='{}' ;;
              '0 7 * * *')     FN='refresh-stale-summaries';  BODY='{}' ;;
              '10 5 * * *')    FN='ai-milestone-explainer';   BODY='{"mode":"stale","limit":5}' ;;
              '10 9 * * *')    FN='home-feed-curator';        BODY='{"mode":"batch"}' ;;
              '0 6 * * *')     FN='gear-cpsc-recall-sync';    BODY='{}' ;;
              '0 4 * * *')     FN='ai-weekly-journey-fill';   BODY='{"mode":"missing","limit":5}' ;;
              '0 9 * * *')     FN='events-ingest-ics';        BODY='{"mode":"all"}' ;;
              '30 9 * * *')    FN='ai-event-screen';          BODY='{"mode":"all","limit":50}' ;;
              '45 9 * * *')    FN='events-geocode';           BODY='{"mode":"all","limit":50}' ;;
              '*/5 * * * *')   FN='gear-moderation-pager';    BODY='{}' ;;
              '*/15 * * * *')  FN='gear-moderation-auto-withdraw'; BODY='{}' ;;
              '0 13 * * *')    FN='gear-moderation-daily-digest';  BODY='{}' ;;
              '0 13 * * 0')    FN='villie-weekly-digest';           BODY='{}' ;;
              *)
                echo "::error::Unknown schedule: ${SCHEDULE}"
                exit 1
                ;;
            esac
          fi
          # Default body if dispatch didn't pass one
          if [ -z "${BODY}" ]; then
            case "${FN}" in
              'home-feed-curator')        BODY='{"mode":"batch"}' ;;
              'ai-weekly-journey-fill')   BODY='{"mode":"missing","limit":5}' ;;
              'ai-milestone-explainer')   BODY='{"mode":"stale","limit":5}' ;;
              'events-ingest-ics')        BODY='{"mode":"all"}' ;;
              'ai-event-screen')          BODY='{"mode":"all","limit":50}' ;;
              'events-geocode')           BODY='{"mode":"all","limit":50}' ;;
              *)                          BODY='{}' ;;
            esac
          fi
          echo "fn=${FN}"   >> "$GITHUB_OUTPUT"
          echo "body=${BODY}" >> "$GITHUB_OUTPUT"
          echo "Will invoke: ${FN} with body ${BODY}"

      - name: Invoke Supabase Edge Function
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FN: ${{ steps.route.outputs.fn }}
          BODY: ${{ steps.route.outputs.body }}
        run: |
          set -euo pipefail
          if [ -z "${PROJECT_REF}" ] || [ -z "${SERVICE_ROLE_KEY}" ]; then
            echo "::error::SUPABASE_PROJECT_REF and SUPABASE_SERVICE_ROLE_KEY must be set as repo secrets"
            exit 1
          fi
          URL="https://${PROJECT_REF}.supabase.co/functions/v1/${FN}"
          # Capture body + http status; print body for log visibility.
          # `--max-time 240` keeps us inside Supabase Edge Function 60s wall
          # time (4x cushion for long-tail retries) and inside the job's
          # 5min timeout-minutes guard.
          #
          # Retry-once policy (added 2026-04-27):
          #   The Supabase edge gateway occasionally returns transient 403/5xx
          #   during deploy rollovers; gear-cpsc-recall-sync caught one on
          #   2026-04-27T12:06Z and self-healed 5 minutes later. Curl's native
          #   `--retry` only retries 408/429/5xx, not 403 — so we wrap the call
          #   in a small bash loop that retries any non-2xx once after 30s.
          #   All cron-invoked functions here are idempotent (upserts on PK or
          #   on (source_feed_id, source_uid)) so retry is safe.
          ATTEMPT=0
          MAX_ATTEMPTS=2
          while :; do
            ATTEMPT=$((ATTEMPT + 1))
            HTTP=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
              --max-time 240 \
              -X POST "${URL}" \
              -H "Authorization: Bearer ${SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -d "${BODY}" || echo "000")
            echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: HTTP ${HTTP}"
            echo '--- response ---'
            cat /tmp/resp.json || true
            echo
            case "${HTTP}" in
              2*) exit 0 ;;
            esac
            if [ "${ATTEMPT}" -ge "${MAX_ATTEMPTS}" ]; then
              break
            fi
            echo "Transient failure — sleeping 30s before retry"
            sleep 30
          done
          # Both attempts non-2xx — fail the job so it shows red in the
          # Actions tab and triggers email/notification per repo settings.
          echo "::error::Function ${FN} returned HTTP ${HTTP} after ${ATTEMPT} attempt(s)"
          exit 1
